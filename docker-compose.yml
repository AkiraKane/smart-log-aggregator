version: "3.8"

services:
  log-aggregator:
    build: .
    volumes:
      - ./logs:/app/logs:ro
      - ./output:/app/output
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
